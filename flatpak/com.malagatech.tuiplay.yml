app-id: com.malagatech.tuiplay
runtime: org.gnome.Platform
runtime-version: '46'
sdk: org.gnome.Sdk
command: tuiplay

finish-args:
  - --socket=pulseaudio       # audio playback
  - --filesystem=home         # access music folder
  - --device=dri              # for potential hardware acceleration

modules:
  - name: tuiplay
    buildsystem: simple
    build-options:
      env:
        CARGO_HOME: /run/build/tuiplay/cargo
    build-commands:
      - cargo build --release --offline
      - install -Dm755 target/release/tuiplay /app/bin/tuiplay
      - install -Dm644 flatpak/com.malagatech.tuiplay.desktop /app/share/applications/com.malagatech.tuiplay.desktop
      - install -Dm644 flatpak/com.malagatech.tuiplay.metainfo.xml /app/share/metainfo/com.malagatech.tuiplay.metainfo.xml
    sources:
      - generated-sources.json
      - type: archive
        url: https://github.com/malagatech/tuiplay/releases/download/v0.1.0/tuiplay-v0.1.0.tar.gz
        sha256: PLACEHOLDER_REPLACE_AFTER_RELEASE
        x-checker-data:
          type: anitya
          project-id: 99999
          url-template: https://github.com/malagatech/tuiplay/releases/download/v$version/tuiplay-v$version.tar.gz
